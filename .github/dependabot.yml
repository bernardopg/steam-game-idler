version: 2

updates:
  # Frontend (Next.js + React + Tauri JS plugins).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Treat Tauri JS plugins as a coherent set so version skews are caught.
      tauri-js:
        patterns:
          - "@tauri-apps/*"
      next-react:
        patterns:
          - "next"
          - "next-themes"
          - "react"
          - "react-dom"
          - "react-i18next"
      eslint-prettier:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "prettier*"
          - "@ianvs/prettier-*"
      types:
        patterns:
          - "@types/*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
          - "postcss*"

  # Rust backend (Tauri 2 host).
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust)"
      include: "scope"
    groups:
      tauri-core:
        patterns:
          - "tauri"
          - "tauri-build"
          - "tauri-plugin-*"
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the submodule's own workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
